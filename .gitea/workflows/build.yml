name: Build

on:
  push:
    branches: [master]
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  INTG_NAME: bluos
  PYINSTALLER_TAG: "3.11.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run lint
        run: |
          pip install pylint black isort
          black --check intg-bluos/ tests/
          isort --check-only intg-bluos/ tests/
        continue-on-error: true

      - name: Run tests
        run: |
          PYTHONPATH=intg-bluos python -m pytest tests/ -v --cov=intg-bluos --cov-report=xml
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        if: startsWith(gitea.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          DRIVER_VERSION=$(jq -r '.version' driver.json)
          if [ "$TAG_VERSION" != "$DRIVER_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, driver.json=$DRIVER_VERSION"
            exit 1
          fi

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(jq -r '.version' driver.json)-dev.${{ gitea.run_number }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        run: docker run --rm --privileged tonistiigi/binfmt --install arm64

      - name: Set up Docker Buildx
        run: docker buildx create --name arm64builder --use

      - name: Build with PyInstaller (aarch64)
        run: |
          docker buildx build --platform linux/arm64 \
            --output type=local,dest=. \
            -f - . <<'DOCKERFILE'
          FROM docker.io/unfoldedcircle/r2-pyinstaller:${{ env.PYINSTALLER_TAG }} AS build
          WORKDIR /src
          COPY requirements.txt .
          RUN pip install -r requirements.txt
          COPY . .
          RUN pyinstaller --clean --onedir \
            --name intg-${{ env.INTG_NAME }} \
            --add-data 'driver.json:.' \
            intg-bluos/driver.py
          FROM scratch
          COPY --from=build /src/dist/ /
          DOCKERFILE

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cd intg-${{ env.INTG_NAME }}
          cp ../driver.json .
          cp ../LICENSE .
          echo "${{ steps.version.outputs.version }}" > version.txt
          tar -czf ../artifacts/uc-intg-${{ env.INTG_NAME }}-${{ steps.version.outputs.version }}-aarch64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: uc-intg-${{ env.INTG_NAME }}
          path: artifacts/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(gitea.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: uc-intg-${{ env.INTG_NAME }}
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          AUTH="Authorization: token ${{ secrets.GITHUB_TOKEN }}"

          # Create release (or retrieve existing)
          RELEASE=$(curl -sf -H "$AUTH" "${API}/releases/tags/${VERSION}" || true)
          if [ -z "$RELEASE" ]; then
            RELEASE=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
              "${API}/releases" \
              -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\"}")
          fi
          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')

          # Upload artifacts
          for FILE in artifacts/*.tar.gz artifacts/checksums.txt; do
            curl -sf -X POST -H "$AUTH" \
              -H "Content-Type: application/octet-stream" \
              "${API}/releases/${RELEASE_ID}/assets?name=$(basename "$FILE")" \
              --data-binary @"$FILE"
          done
