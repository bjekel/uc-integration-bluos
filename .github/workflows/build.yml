name: Build

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  INTG_NAME: bluos
  PYTHON_VER: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run lint
        run: |
          pip install pylint black isort
          black --check intg-bluos/ tests/
          isort --check-only intg-bluos/ tests/
        continue-on-error: true

      - name: Run tests
        run: |
          PYTHONPATH=intg-bluos python -m pytest tests/ -v --cov=intg-bluos --cov-report=xml
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          DRIVER_VERSION=$(jq -r '.version' driver.json)
          if [ "$TAG_VERSION" != "$DRIVER_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, driver.json=$DRIVER_VERSION"
            exit 1
          fi

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(jq -r '.version' driver.json)-dev.${{ github.run_number }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller (aarch64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            --platform linux/arm64 \
            docker.io/unfoldedcircle/r2-pyinstaller:${{ env.PYTHON_VER }} \
            bash -c "cd /src && \
              pip install -r requirements.txt && \
              pyinstaller --clean --onedir \
                --name intg-${{ env.INTG_NAME }} \
                --add-data 'driver.json:.' \
                intg-bluos/driver.py"

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cd dist/intg-${{ env.INTG_NAME }}
          cp ../../driver.json .
          cp ../../LICENSE .
          echo "${{ steps.version.outputs.version }}" > version.txt
          tar -czf ../../artifacts/uc-intg-${{ env.INTG_NAME }}-${{ steps.version.outputs.version }}-aarch64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uc-intg-${{ env.INTG_NAME }}
          path: artifacts/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: uc-intg-${{ env.INTG_NAME }}
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
