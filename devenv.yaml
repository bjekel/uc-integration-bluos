inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
  nixpkgs-unstable:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
allowUnfree: true
